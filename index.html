<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>easyTravel — AI Trip Planner</title>
    <meta
      name="description"
      content="Type a city and AI builds themed trip scenarios; places are numbered in the most efficient order on a map and exported to Google My Maps."
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="logo"><span>easy</span>Travel</div>
    </header>

    <main class="container">
      <section class="panel controls">
        <form id="search-form">
          <div class="field">
            <label for="city">Destination city</label>
            <input
              id="city"
              name="city"
              type="text"
              placeholder="e.g. Rome, Barcelona, Tokyo…"
              autocomplete="off"
              required
            />
          </div>
          <div class="field days">
            <label for="days">How many days?</label>
            <input id="days" name="days" type="number" min="1" max="14" placeholder="3" required />
          </div>
          <button type="submit" id="go-btn">Generate scenarios</button>
        </form>
        <p class="hint" id="hint">
          Enter a city and number of days — I'll build themed routes, number each stop
          1, 2, 3 in the best visiting order, and give you a file to add to Google Maps.
        </p>
      </section>

      <section class="workspace">
        <aside class="panel scenarios" id="scenarios">
          <div class="empty-state">
            <p>No scenarios yet.</p>
            <p class="muted">Enter a city above to get started.</p>
          </div>
        </aside>
        <div class="panel map-wrap">
          <div id="map"></div>
        </div>
      </section>
    </main>

    <div id="toast" class="toast" hidden></div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="/app.js"></script>
  </body>
</html>
